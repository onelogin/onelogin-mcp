name: Publish Package

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  SECRETS: ${{ toJson(secrets) }}

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Scan
        uses: onelogin/.github-private/platform/actions/scan/v2@master

  publish:
    runs-on: ubuntu-latest
    needs: scan
    steps:
      - name: Publish to npm
        uses: onelogin/.github-private/platform/actions/publish-package/v1@master
